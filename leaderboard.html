<html lang="en">
<head>

    <meta name="twitter:image" content="public/og-image.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/iconoir-icons/iconoir@main/css/iconoir.css">
    <link rel="stylesheet" href="styles/game.css">
    <style>
        html, body {
            overflow: auto !important;
            overflow-y: auto !important;
            height: auto !important;
            overscroll-behavior: auto !important;
            -webkit-user-select: auto !important;
            user-select: auto !important;
        }
        body {
            padding: 0;
            display: block !important;
        }

        .leaderboard-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 20px 60px 20px;
        }

        .page-title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 25px auto 20px auto;
            max-width: 700px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .title-glow-line {
            flex: 1;
            height: 3px;
            border-radius: 3px;
            min-width: 40px;
        }

        .title-glow-line.left {
            background: linear-gradient(to right, transparent 0%, #4E78E8 50%, #8338EC 100%);
            box-shadow: 0 0 12px rgba(78, 120, 232, 0.6), 0 0 4px rgba(131, 56, 236, 0.4);
            animation: pulseLineLeft 3s ease-in-out infinite;
        }

        .title-glow-line.right {
            background: linear-gradient(to left, transparent 0%, #E87ADC 50%, #FF8FA3 100%);
            box-shadow: 0 0 12px rgba(232, 122, 220, 0.6), 0 0 4px rgba(255, 143, 163, 0.4);
            animation: pulseLineRight 3s ease-in-out infinite;
        }

        @keyframes pulseLineLeft {
            0%, 100% {
                opacity: 0.6;
                box-shadow: 0 0 8px rgba(78, 120, 232, 0.4), 0 0 2px rgba(131, 56, 236, 0.3);
            }
            50% {
                opacity: 1;
                box-shadow: 0 0 20px rgba(78, 120, 232, 0.8), 0 0 6px rgba(131, 56, 236, 0.5);
            }
        }

        @keyframes pulseLineRight {
            0%, 100% {
                opacity: 0.6;
                box-shadow: 0 0 8px rgba(232, 122, 220, 0.4), 0 0 2px rgba(255, 143, 163, 0.3);
            }
            50% {
                opacity: 1;
                box-shadow: 0 0 20px rgba(232, 122, 220, 0.8), 0 0 6px rgba(255, 143, 163, 0.5);
            }
        }

        .page-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #4E78E8, #E87ADC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* Mode Tabs (Main Game vs Daily) */
        .mode-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .mode-tab {
            padding: 10px 24px;
            background: rgba(78, 120, 232, 0.08);
            border: 2px solid rgba(78, 120, 232, 0.2);
            border-radius: 10px;
            color: var(--text-secondary);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .mode-tab:hover {
            background: rgba(78, 120, 232, 0.15);
            border-color: var(--arc);
            color: var(--text-primary);
        }

        .mode-tab.active {
            background: rgba(78, 120, 232, 0.2);
            border-color: var(--arc);
            color: var(--text-primary);
            box-shadow: 0 0 12px rgba(78, 120, 232, 0.3);
        }

        .mode-tab.daily.active {
            background: rgba(50, 255, 180, 0.15);
            border-color: #32FFB4;
            color: #7FFFD4;
            box-shadow: 0 0 12px rgba(50, 255, 180, 0.3);
        }



        /* Leaderboard Card */
        .leaderboard-card {
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: 15px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(78, 120, 232, 0.2);
            animation: fadeIn 0.5s ease-out;
            min-height: 200px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Table Header */
        .leaderboard-header {
            display: grid;
            grid-template-columns: 60px 1fr 120px;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(78, 120, 232, 0.3);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Leaderboard Row */
        .leaderboard-row {
            display: grid;
            grid-template-columns: 60px 1fr 120px;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(78, 120, 232, 0.1);
            align-items: center;
            transition: all 0.2s ease;
        }

        .leaderboard-row:last-child {
            border-bottom: none;
        }

        .leaderboard-row:hover {
            background: rgba(78, 120, 232, 0.08);
        }

        /* Rank Styles */
        .rank {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .rank-1 .rank {
            color: #FFD700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .rank-2 .rank {
            color: #C0C0C0;
            text-shadow: 0 0 15px rgba(192, 192, 192, 0.5);
        }

        .rank-3 .rank {
            color: #CD7F32;
            text-shadow: 0 0 15px rgba(205, 127, 50, 0.5);
        }

        .rank-1 .rank::before,
        .rank-2 .rank::before,
        .rank-3 .rank::before {
            margin-right: 6px;
        }

        /* Player Info */
        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--arc), var(--pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            flex-shrink: 0;
        }

        .player-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 180px;
        }

        /* Score */
        .score {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--arc);
            text-align: right;
            text-shadow: 0 0 10px rgba(78, 120, 232, 0.4);
        }

        .rank-1 .score {
            color: #FFD700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        /* Your Score Highlight */
        .leaderboard-row.you {
            background: rgba(232, 122, 220, 0.15);
            border-left: 3px solid var(--pink);
        }

        .leaderboard-row.you .player-name::after {
            content: ' (You)';
            color: var(--pink);
            font-size: 0.85rem;
        }

        /* Loading & Empty States */
        .loading-state, .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-family: 'Space Grotesk', sans-serif;
        }

        .loading-state i {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .empty-state i {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
            opacity: 0.5;
        }

        /* Stats Section */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 25px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--arc);
            text-shadow: 0 0 15px rgba(78, 120, 232, 0.5);
            margin-bottom: 5px;
        }

        .stat-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }


        /* Auth overlay for leaderboard page */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-overlay.hidden {
            display: none;
        }

        .auth-panel {
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: 15px;
            max-width: 360px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        .auth-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(78, 120, 232, 0.2);
        }

        .auth-panel-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .auth-panel-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
        }

        .auth-panel-close:hover {
            color: var(--text-primary);
        }

        .auth-panel-body {
            padding: 20px 18px;
        }

        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(78, 120, 232, 0.3);
        }

        .auth-tab {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .auth-tab.active {
            background: rgba(78, 120, 232, 0.2);
            color: var(--text-primary);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .auth-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(78, 120, 232, 0.3);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            padding: 10px 14px;
            outline: none;
        }

        .auth-input:focus {
            border-color: var(--arc);
            box-shadow: 0 0 8px rgba(78, 120, 232, 0.3);
        }

        .auth-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .auth-btn-primary {
            background: linear-gradient(135deg, var(--arc), var(--pink));
            border: none;
            border-radius: 8px;
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 10px;
            cursor: pointer;
            margin-top: 4px;
        }

        .auth-btn-primary:hover {
            box-shadow: 0 4px 12px rgba(78, 120, 232, 0.4);
        }

        .auth-btn-link {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 0;
            text-align: right;
            opacity: 0.7;
        }

        .auth-btn-link:hover {
            color: var(--arc);
            opacity: 1;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
            color: var(--text-secondary);
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(78, 120, 232, 0.2);
        }

        .auth-btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            padding: 10px;
            cursor: pointer;
        }

        .auth-btn-google:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .auth-error {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            color: #E84E6A;
            text-align: center;
            margin-top: 10px;
            min-height: 18px;
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .page-title {
                font-size: 1.3rem;
                letter-spacing: 2px;
            }

            .page-title-wrapper {
                gap: 12px;
                margin: 20px auto 16px auto;
                padding: 0 12px;
            }

            .mode-tabs {
                gap: 8px;
            }

            .mode-tab {
                padding: 8px 16px;
                font-size: 0.85rem;
            }

            .leaderboard-header {
                grid-template-columns: 45px 1fr 90px;
                padding: 12px 15px;
                font-size: 0.65rem;
            }

            .leaderboard-row {
                grid-template-columns: 45px 1fr 90px;
                padding: 12px 15px;
            }

            .player-avatar {
                width: 30px;
                height: 30px;
                font-size: 0.75rem;
            }

            .player-name {
                font-size: 0.9rem;
            }

            .score {
                font-size: 0.95rem;
            }

            .stats-section {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .stat-card {
                padding: 15px;
            }

            .stat-value {
                font-size: 1.5rem;
            }
        }

        /* Mobile landscape */
        @media screen and (max-width: 932px) and (orientation: landscape) {
            .navbar {
                display: flex !important;
                height: 50px;
            }

            .mobile-hud {
                display: none !important;
            }

            .leaderboard-container {
                padding-top: 10px;
            }

            .page-title {
                font-size: 1.5rem;
            }

            .page-title-wrapper {
                margin: 10px auto 15px auto;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-left">
            <a href="index.html" class="nav-icon-btn" title="Back to Game">
                <i class="iconoir-arrow-left"></i>

            <span id="navbarUser" class="navbar-user" title="Account"></span>
        </div>

        <div class="navbar-center">
        </div>

        <div class="navbar-right">
            <a href="index.html" class="nav-icon-btn" title="Play Game">

    <div class="page-title-wrapper">
        <div class="title-glow-line left"></div>
        <div class="page-title">Global Leaderboard</div>
        <div class="title-glow-line right"></div>
    </div>

    <div class="leaderboard-container">
        <!-- Auth Modal (leaderboard page) -->
        <div class="auth-overlay hidden" id="lbAuthOverlay">
            <div class="auth-panel">
                <div class="auth-panel-header">
                    <span class="auth-panel-title">Sign In</span>

                <div class="auth-panel-body">

                    <div class="auth-divider"><span>or</span></div>

                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        Continue with Google
                    </button>
                    <div id="lbAuthError" class="auth-error"></div>
                </div>

        </div>

        <!-- Mode Tabs -->
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="main">
                <i class="iconoir-shield"></i> Main Game
            </button>
            <button class="mode-tab daily" data-mode="daily">
                <i class="iconoir-calendar"></i> Daily Challenge
            </button>

        <!-- Leaderboard Table -->
        <div class="leaderboard-card">

                <span>Rank</span>

                <div class="stat-label">Your Best</div>

                <div class="stat-value" id="statYourRank">--</div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script type="module">
        import { FirebaseAuth } from './js/firebase/FirebaseAuth.js';
        import { LeaderboardService } from './js/firebase/LeaderboardService.js';

        // State
        let currentMode = 'main';
        let currentDailyDate = new Date().toISOString().slice(0, 10);
        let auth = null;
        let service = null;

        // Initialize
        async function init() {
            auth = new FirebaseAuth();
            await auth.ensureAuth();
            service = new LeaderboardService(auth);

            // Update navbar user display
            updateNavbarUser();
            auth.onAuthChange(() => {
                updateNavbarUser();
                loadLeaderboard();
                loadStats();
            });

            setupTabs();
            await loadLeaderboard();
            loadStats();
        }

        function updateNavbarUser() {
            const el = document.getElementById('navbarUser');
            if (!el) return;
            if (auth.isSignedIn()) {
                const name = auth.getDisplayName() || auth.getUser().displayName || 'User';
                el.textContent = name;
                el.onclick = null;
                el.style.cursor = 'default';
                el.title = 'Signed in';
            } else {
                el.textContent = 'Sign In';
                el.onclick = () => window.openLbAuth();
                el.style.cursor = 'pointer';
                el.title = 'Sign in to save scores';
            }
        }

        // Leaderboard auth modal handlers
        window.openLbAuth = function() {
            document.getElementById('lbAuthOverlay').classList.remove('hidden');
            document.getElementById('lbAuthError').textContent = '';
        };

        window.closeLbAuth = function() {
            document.getElementById('lbAuthOverlay').classList.add('hidden');
        };

        // Tab switching
        document.querySelectorAll('#lbAuthTabs .auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('#lbAuthTabs .auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('lbAuthError').textContent = '';
                if (tab.dataset.tab === 'signup') {
                    document.getElementById('lbSignInForm').style.display = 'none';
                    document.getElementById('lbSignUpForm').style.display = 'flex';
                } else {
                    document.getElementById('lbSignInForm').style.display = 'flex';
                    document.getElementById('lbSignUpForm').style.display = 'none';
                }
            });
        });

        // Close on backdrop
        document.getElementById('lbAuthOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) window.closeLbAuth();
        });

        window.doLbEmailSignIn = async function() {
            const email = document.getElementById('lbEmail').value.trim();
            const password = document.getElementById('lbPassword').value;
            const errorEl = document.getElementById('lbAuthError');
            if (!email || !password) { errorEl.textContent = 'Please enter email and password.'; return; }
            errorEl.textContent = '';
            const result = await auth.signInWithEmail(email, password);
            if (result.success) { window.closeLbAuth(); }
            else { errorEl.textContent = result.error || 'Sign in failed.'; }
        };

        window.doLbEmailSignUp = async function() {
            const name = document.getElementById('lbSignUpName').value.trim();
            const email = document.getElementById('lbSignUpEmail').value.trim();
            const password = document.getElementById('lbSignUpPassword').value;
            const errorEl = document.getElementById('lbAuthError');
            if (!email || !password) { errorEl.textContent = 'Please enter email and password.'; return; }
            errorEl.textContent = '';
            const result = await auth.signUpWithEmail(email, password, name);
            if (result.success) { window.closeLbAuth(); }
            else { errorEl.textContent = result.error || 'Sign up failed.'; }
        };

        window.doLbGoogleSignIn = async function() {
            const errorEl = document.getElementById('lbAuthError');
            errorEl.textContent = '';
            const result = await auth.signInWithGoogle();
            if (result.success) { window.closeLbAuth(); }
            else if (result.error) { errorEl.textContent = result.error; }
        };

        window.doLbPasswordReset = async function() {
            const email = document.getElementById('lbEmail').value.trim();
            const errorEl = document.getElementById('lbAuthError');
            if (!email) { errorEl.textContent = 'Enter your email above, then click forgot password.'; return; }
            const result = await auth.sendPasswordReset(email);
            if (result.success) {
                errorEl.style.color = '#32FFB4';
                errorEl.textContent = 'Password reset email sent!';
                setTimeout(() => { errorEl.style.color = ''; }, 3000);
            } else { errorEl.textContent = result.error; }
        };

        window.doSignOut = async function() {
            await auth.signOut();
        };

        function setupTabs() {
            // Mode tabs
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentMode = tab.dataset.mode;

                    // Show/hide daily date picker
                    loadLeaderboard();
                    loadStats();
                });
            });

        }

        async function loadLeaderboard() {
            const body = document.getElementById('leaderboardBody');
            body.innerHTML = '<div class="loading-state"><i class="iconoir-refresh"></i><div>Loading scores...</div></div>';

            try {
                const dailyDate = currentMode === 'daily' ? currentDailyDate : null;
                const entries = await service.getLeaderboard(currentMode, 'all', dailyDate, 50);
                const uid = auth.getUID();

                if (entries.length === 0) {
                    body.innerHTML = '<div class="empty-state"><i class="iconoir-shield-xmark"></i><div>No scores yet. Be the first!</div></div>';
                    return;
                }

                body.innerHTML = entries.map((entry, i) => {
                    const rank = i + 1;
                    const rankClass = rank <= 3 ? ` rank-${rank}` : '';
                    const youClass = entry.uid === uid ? ' you' : '';
                    const initial = (entry.displayName || 'A').charAt(0).toUpperCase();

                    return `
                        <div class="leaderboard-row${rankClass}${youClass}">
                            <span class="rank">#${rank}</span>
                            <div class="player-info">
                                <div class="player-avatar">${initial}</div>
                                <span class="player-name">${escapeHtml(entry.displayName || 'Anonymous')}</span>
                            </div>
                            <span class="score">${escapeHtml(entry.scoreFormatted || formatScore(entry.score))}</span>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error('Failed to load leaderboard:', error);
                body.innerHTML = '<div class="empty-state"><i class="iconoir-warning-triangle"></i><div>Failed to load scores. Please try again.</div></div>';
            }
        }

        async function loadStats() {
            try {
                // Total players
                const total = await service.getTotalPlayers(currentMode);
                document.getElementById('statTotalPlayers').textContent = total.toLocaleString();

                // User's best score
                const dailyDate = currentMode === 'daily' ? currentDailyDate : null;
                const userScore = await service.getUserScore(currentMode, dailyDate);
                if (userScore) {
                    document.getElementById('statYourBest').textContent = userScore.scoreFormatted || formatScore(userScore.score);

                    // User's rank
                    const rank = await service.getUserRank(currentMode, userScore.score);
                    document.getElementById('statYourRank').textContent = rank ? `#${rank}` : '--';
                } else {
                    document.getElementById('statYourBest').textContent = '--';
                    document.getElementById('statYourRank').textContent = '--';
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        function formatScore(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            const cs = Math.floor((seconds % 1) * 100);
            return `${mins}:${secs.toString().padStart(2, '0')}.${cs.toString().padStart(2, '0')}`;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Start
        init().catch(err => {
            console.error('Leaderboard init failed:', err);
            document.getElementById('leaderboardBody').innerHTML =
                '<div class="empty-state"><i class="iconoir-warning-triangle"></i><div>Failed to connect to leaderboard. Please try again.</div></div>';
        });
    </script>
</body>
</html>
