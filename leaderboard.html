<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Leaderboard - REFLECTIONS</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/public/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/public/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/public/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/public/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Reflections - Leaderboard">
    <meta property="og:description" content="A Geometric Game To Reflect On">
    <meta property="og:image" content="/public/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Reflections - Leaderboard">
    <meta name="twitter:description" content="A Geometric Game To Reflect On">
    <meta name="twitter:image" content="/public/og-image.png">
    <meta name="description" content="A Geometric Game To Reflect On">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/iconoir-icons/iconoir@main/css/iconoir.css">
    <link rel="stylesheet" href="/styles/game.css">
    <style>
        html, body {
            overflow: auto !important;
            overflow-y: auto !important;
            height: auto !important;
            overscroll-behavior: auto !important;
            -webkit-user-select: auto !important;
            user-select: auto !important;
        }
        body {
            padding: 0;
            display: block !important;
        }
        /* Remove portrait rotation lock on non-game pages */
        body::after {
            display: none !important;
            content: none !important;
        }
        body > * {
            opacity: 1 !important;
        }

        .leaderboard-container {
            max-width: 520px;
            margin: 0 auto;
            padding: 20px 20px 60px 20px;
            position: relative;
        }

        .page-title-section {
            text-align: center;
            margin: 14px 0 14px 0;
        }

        .game-brand {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--text-secondary);
            opacity: 0.5;
            margin-bottom: 2px;
        }

        .page-title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 0 auto;
            max-width: 700px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .title-glow-line {
            flex: 1;
            height: 3px;
            border-radius: 3px;
            min-width: 40px;
        }

        .title-glow-line.left {
            background: linear-gradient(to right, transparent 0%, #4E78E8 50%, #8338EC 100%);
            box-shadow: 0 0 12px rgba(78, 120, 232, 0.6), 0 0 4px rgba(131, 56, 236, 0.4);
            animation: pulseLineLeft 3s ease-in-out infinite;
        }

        .title-glow-line.right {
            background: linear-gradient(to left, transparent 0%, #FFB020 50%, #FFD07A 100%);
            box-shadow: 0 0 12px rgba(232, 122, 220, 0.6), 0 0 4px rgba(255, 143, 163, 0.4);
            animation: pulseLineRight 3s ease-in-out infinite;
        }

        @keyframes pulseLineLeft {
            0%, 100% {
                opacity: 0.6;
                box-shadow: 0 0 8px rgba(78, 120, 232, 0.4), 0 0 2px rgba(131, 56, 236, 0.3);
            }
            50% {
                opacity: 1;
                box-shadow: 0 0 20px rgba(78, 120, 232, 0.8), 0 0 6px rgba(131, 56, 236, 0.5);
            }
        }

        @keyframes pulseLineRight {
            0%, 100% {
                opacity: 0.6;
                box-shadow: 0 0 8px rgba(232, 122, 220, 0.4), 0 0 2px rgba(255, 143, 163, 0.3);
            }
            50% {
                opacity: 1;
                box-shadow: 0 0 20px rgba(232, 122, 220, 0.8), 0 0 6px rgba(255, 143, 163, 0.5);
            }
        }

        .page-title {
            font-family: 'Orbitron', 'Rajdhani', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #4E78E8, #FFB020);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* Mode Tabs (in navbar) */
        .mode-tabs {
            display: flex;
            border: 1px solid rgba(78, 120, 232, 0.3);
            border-radius: 5px;
            overflow: hidden;
        }

        .mode-tab {
            padding: 4px 10px;
            background: transparent;
            border: none;
            border-right: 1px solid rgba(78, 120, 232, 0.2);
            color: var(--text-secondary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
            line-height: 1.2;
        }

        .mode-tab:last-child {
            border-right: none;
        }

        .mode-tab:hover {
            background: rgba(78, 120, 232, 0.1);
            color: var(--text-primary);
        }

        .mode-tab.active {
            background: rgba(78, 120, 232, 0.25);
            color: var(--text-primary);
        }

        .mode-tab.daily.active {
            background: rgba(50, 255, 180, 0.15);
            color: #7FFFD4;
        }



        /* Leaderboard Card */
        .leaderboard-card {
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: 15px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(78, 120, 232, 0.2);
            animation: fadeIn 0.5s ease-out;
            min-height: 200px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Table Header */
        .leaderboard-header {
            display: grid;
            grid-template-columns: 60px 1fr 80px 100px;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(78, 120, 232, 0.3);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .leaderboard-header.daily-mode,
        .leaderboard-row.daily-mode {
            grid-template-columns: 60px 1fr 120px;
        }

        /* Leaderboard Row */
        .leaderboard-row {
            display: grid;
            grid-template-columns: 60px 1fr 80px 100px;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(78, 120, 232, 0.1);
            align-items: center;
            transition: all 0.2s ease;
        }

        .mirror-count {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-align: center;
        }

        .leaderboard-row:last-child {
            border-bottom: none;
        }

        .leaderboard-row.has-replay:hover {
            background: rgba(78, 120, 232, 0.15);
        }

        .leaderboard-row:hover {
            background: rgba(78, 120, 232, 0.08);
        }

        /* Rank Styles */
        .rank {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .rank-1 .rank {
            color: #FFD700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .rank-2 .rank {
            color: #C0C0C0;
            text-shadow: 0 0 15px rgba(192, 192, 192, 0.5);
        }

        .rank-3 .rank {
            color: #CD7F32;
            text-shadow: 0 0 15px rgba(205, 127, 50, 0.5);
        }

        .rank-1 .rank::before,
        .rank-2 .rank::before,
        .rank-3 .rank::before {
            margin-right: 6px;
        }

        /* Player Info */
        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--arc), var(--pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            flex-shrink: 0;
        }

        .player-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 180px;
        }

        /* Score */
        .score {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--arc);
            text-align: right;
            text-shadow: 0 0 10px rgba(78, 120, 232, 0.4);
        }

        .rank-1 .score {
            color: #FFD700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        /* Your Score Highlight */
        .leaderboard-row.you {
            background: rgba(232, 122, 220, 0.15);
            border-left: 3px solid var(--pink);
        }

        .leaderboard-row.you .player-name::after {
            content: ' (You)';
            color: var(--pink);
            font-size: 0.85rem;
        }

        /* Loading & Empty States */
        .loading-state, .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-family: 'Rajdhani', sans-serif;
        }

        .loading-state i {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Clean ring spinner: a faint track with one bright accent arc. */
        .lb-spinner {
            width: 30px;
            height: 30px;
            margin: 0 auto 14px;
            border-radius: 50%;
            border: 3px solid rgba(78, 120, 232, 0.18);
            border-top-color: #4E78E8;
            animation: spin 0.8s linear infinite;
            box-sizing: border-box;
        }

        .empty-state i {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
            opacity: 0.5;
        }

        /* Stats Panel - positioned left of leaderboard on desktop */
        .stats-panel {
            position: absolute;
            top: 0;
            right: calc(100% + 20px);
            width: 120px;
        }

        .stats-panel-inner {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 8px 0;
            border-bottom: 1px solid rgba(78, 120, 232, 0.1);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.55rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 1px;
            opacity: 0.6;
        }

        .stat-value {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--arc);
            text-shadow: 0 0 8px rgba(78, 120, 232, 0.3);
        }


        /* Auth overlay for leaderboard page */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-overlay.hidden {
            display: none;
        }

        .auth-panel {
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: 15px;
            max-width: 360px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        .auth-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(78, 120, 232, 0.2);
        }

        .auth-panel-title {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .auth-panel-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
        }

        .auth-panel-close:hover {
            color: var(--text-primary);
        }

        .auth-panel-body {
            padding: 20px 18px;
        }

        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(78, 120, 232, 0.3);
        }

        .auth-tab {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .auth-tab.active {
            background: rgba(78, 120, 232, 0.2);
            color: var(--text-primary);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .auth-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(78, 120, 232, 0.3);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            padding: 10px 14px;
            outline: none;
        }

        .auth-input:focus {
            border-color: var(--arc);
            box-shadow: 0 0 8px rgba(78, 120, 232, 0.3);
        }

        .auth-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .auth-btn-primary {
            background: linear-gradient(135deg, var(--arc), var(--pink));
            border: none;
            border-radius: 8px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 10px;
            cursor: pointer;
            margin-top: 4px;
        }

        .auth-btn-primary:hover {
            box-shadow: 0 4px 12px rgba(78, 120, 232, 0.4);
        }

        .auth-btn-link {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 0;
            text-align: right;
            opacity: 0.7;
        }

        .auth-btn-link:hover {
            color: var(--arc);
            opacity: 1;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
            color: var(--text-secondary);
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(78, 120, 232, 0.2);
        }

        .auth-btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            padding: 10px;
            cursor: pointer;
        }

        .auth-btn-google:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .auth-error {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.75rem;
            color: #E84E6A;
            text-align: center;
            margin-top: 10px;
            min-height: 18px;
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .page-title {
                font-size: 1.3rem;
                letter-spacing: 2px;
            }

            .page-title-section {
                margin: 10px 0 10px 0;
            }

            .page-title-wrapper {
                gap: 12px;
                padding: 0 12px;
            }

            .mode-tab {
                padding: 3px 8px;
                font-size: 0.6rem;
            }

            .leaderboard-container {
                padding: 10px 8px 60px 8px;
            }

            .leaderboard-header {
                grid-template-columns: 28px 1fr 40px 58px;
                padding: 8px 10px;
                font-size: 0.55rem;
                letter-spacing: 1px;
            }

            .leaderboard-header.daily-mode,
            .leaderboard-row.daily-mode {
                grid-template-columns: 28px 1fr 58px;
            }

            .leaderboard-row {
                grid-template-columns: 28px 1fr 40px 58px;
                padding: 10px 10px;
            }

            .rank {
                font-size: 0.85rem;
            }

            .mirror-count {
                font-size: 0.7rem;
            }

            .player-avatar {
                width: 24px;
                height: 24px;
                font-size: 0.65rem;
            }

            .player-info {
                gap: 8px;
            }

            .player-name {
                font-size: 0.8rem;
                max-width: 100px;
            }

            .score {
                font-size: 0.8rem;
            }

            /* Stats panel: horizontal bar above leaderboard */
            .stats-panel {
                position: static;
                transform: none;
                width: 100%;
                left: auto;
                margin-bottom: 10px;
            }

            .stats-panel-inner {
                flex-direction: row;
                justify-content: space-around;
                align-items: center;
            }

            .stat-row {
                flex-direction: column;
                align-items: center;
                gap: 1px;
                padding: 0;
                border-bottom: none;
            }

            .stat-label {
                font-size: 0.45rem;
                order: 2;
            }

            .stat-value {
                font-size: 0.85rem;
                order: 1;
            }

            /* Two-column compact leaderboard for mobile */
            .leaderboard-header {
                display: none;
            }

            .leaderboard-card {
                background: transparent;
                border: none;
                box-shadow: none;
                backdrop-filter: none;
                min-height: 0;
                overflow: visible;
            }

            #leaderboardBody {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }

            .leaderboard-row,
            .leaderboard-row.daily-mode {
                display: grid;
                grid-template-columns: auto 1fr;
                grid-template-rows: auto auto;
                column-gap: 6px;
                row-gap: 2px;
                padding: 8px 10px;
                border: 1px solid rgba(78, 120, 232, 0.18);
                border-bottom: 1px solid rgba(78, 120, 232, 0.18);
                border-radius: 8px;
                background: rgba(13, 13, 26, 0.5);
                align-items: center;
            }

            .leaderboard-row .rank {
                grid-column: 1;
                grid-row: 1;
                font-size: 0.8rem;
            }

            .leaderboard-row .player-info {
                grid-column: 2;
                grid-row: 1;
                min-width: 0;
                gap: 0;
            }

            .leaderboard-row .player-avatar {
                display: none;
            }

            .leaderboard-row .player-name {
                font-size: 0.78rem;
                max-width: none;
            }

            .leaderboard-row.you .player-name::after {
                content: ' (You)';
                font-size: 0.65rem;
            }

            .leaderboard-row .mirror-count {
                grid-column: 1;
                grid-row: 2;
                text-align: left;
                font-size: 0.62rem;
                opacity: 0.7;
            }

            .leaderboard-row .score {
                grid-column: 2;
                grid-row: 2;
                text-align: right;
                font-size: 0.95rem;
            }

            .leaderboard-row.daily-mode .score {
                grid-column: 1 / -1;
            }

            .loading-state,
            .empty-state {
                grid-column: 1 / -1;
            }
        }

        /* Mobile landscape */
        @media screen and (max-width: 932px) and (orientation: landscape) {
            .navbar {
                display: flex !important;
                height: 50px;
            }

            .mobile-hud {
                display: none !important;
            }

            .leaderboard-container {
                padding-top: 10px;
            }

            .page-title {
                font-size: 1.5rem;
            }

            .page-title-section {
                margin: 8px 0 10px 0;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-left">
            <a href="/" class="nav-icon-btn" title="Back to Game">
                <i class="iconoir-arrow-left"></i>
            </a>
            <span id="navbarUser" class="navbar-user" onclick="openAuthModal()" title="Account"></span>
        </div>

        <div class="navbar-center">
            <div class="mode-tabs">
                <button class="mode-tab active" data-mode="main">
                    <i class="iconoir-shield"></i> Main Game
                </button>
                <button class="mode-tab daily" data-mode="daily">
                    <i class="iconoir-calendar"></i> Daily
                </button>
            </div>
        </div>

        <div class="navbar-right">
            <a href="/" class="nav-icon-btn" title="Play Game">
                <i class="iconoir-play"></i>
            </a>
            <a href="/about" class="nav-icon-btn" title="About">
                <i class="iconoir-book"></i>
            </a>
        </div>
    </nav>

    <div class="page-title-section">
        <div class="game-brand">REFLECTIONS</div>
        <div class="page-title-wrapper">
            <div class="title-glow-line left"></div>
            <div class="page-title">Global Leaderboard</div>
            <div class="title-glow-line right"></div>
        </div>
    </div>

    <div class="leaderboard-container">
        <!-- Auth Modal (leaderboard page) -->

        <!-- Player Stats -->
        <div class="stats-panel" id="statsPanel">
            <div class="stats-panel-inner">
                <div class="stat-row">
                    <span class="stat-label">RANK</span>
                    <span class="stat-value" id="statYourRank">--</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">BEST</span>
                    <span class="stat-value" id="statYourBest">--</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">PLAYERS</span>
                    <span class="stat-value" id="statTotalPlayers">--</span>
                </div>
            </div>
        </div>

        <!-- Leaderboard Table -->
        <div class="leaderboard-card">
            <div class="leaderboard-header" id="leaderboardHeader">
                <span>Rank</span>
                <span>Player</span>
                <span style="text-align: center;">Mirrors</span>
                <span style="text-align: right;">Time</span>
            </div>
            <div id="leaderboardBody">
                <div class="loading-state">
                    <div class="lb-spinner"></div>
                    <div>Loading scores...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Replay Video Modal -->
    <div id="replayModal" class="auth-overlay hidden" style="z-index: 10001;">
        <div class="auth-panel" style="max-width: 500px; width: 95%;">
            <div class="auth-panel-header">
                <span class="auth-panel-title" id="replayTitle">Replay</span>
                <button class="auth-panel-close" onclick="closeReplayModal()"><i class="iconoir-xmark"></i></button>
            </div>
            <div style="padding: 0;">
                <video id="replayVideo" playsinline controls style="width: 100%; display: block; border-radius: 0 0 15px 15px; background: #000;"></video>
                <div id="replayLoading" style="text-align: center; padding: 40px 20px; color: var(--text-secondary); font-family: 'Rajdhani', sans-serif;">
                    <div class="lb-spinner"></div>
                    Loading replay...
                </div>
                <div id="replayError" style="text-align: center; padding: 30px 20px; color: var(--text-secondary); font-family: 'Rajdhani', sans-serif; display: none;">
                    <i class="iconoir-video-camera-off" style="font-size: 1.5rem; display: block; margin-bottom: 8px; opacity: 0.5;"></i>
                    No replay available for this score
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-functions-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-check-compat.js"></script>

    <script type="module">
        import { FirebaseAuth } from './js/firebase/FirebaseAuth.js';
        import { LeaderboardService } from './js/firebase/LeaderboardService.js';
        import { initAuthUI } from './js/firebase/AuthUI.js';

        // State
        let currentMode = 'main';
        let currentDailyDate = new Date().toISOString().slice(0, 10);
        let auth = null;
        let service = null;

        // Initialize
        async function init() {
            auth = new FirebaseAuth();
            await auth.ensureAuth();
            service = new LeaderboardService(auth);

            // Shared account UI — the same module the game page uses (auth modal,
            // sign-in/up/out, unique-username enforcement, navbar). It injects the
            // modal into this page, so there's no duplicate auth code anymore.
            initAuthUI({ auth, onChange: () => { loadLeaderboard(); loadStats(); } });

            setupTabs();
            await loadLeaderboard();
            loadStats();
        }

        function setupTabs() {
            // Mode tabs
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentMode = tab.dataset.mode;

                    // Show/hide daily date picker
                    loadLeaderboard();
                    loadStats();
                });
            });

        }

        async function loadLeaderboard() {
            const body = document.getElementById('leaderboardBody');
            body.innerHTML = '<div class="loading-state"><div class="lb-spinner"></div><div>Loading scores...</div></div>';

            try {
                const dailyDate = currentMode === 'daily' ? currentDailyDate : null;
                const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 10000));
                const entries = await Promise.race([
                    service.getLeaderboard(currentMode, 'all', dailyDate, 25),
                    timeout
                ]);
                const uid = auth.getUID();

                if (entries.length === 0) {
                    body.innerHTML = '<div class="empty-state"><i class="iconoir-shield-xmark"></i><div>No scores yet. Be the first!</div></div>';
                    return;
                }

                // Toggle mirrors column based on mode
                const header = document.getElementById('leaderboardHeader');
                const isDaily = currentMode === 'daily';
                header.className = 'leaderboard-header' + (isDaily ? ' daily-mode' : '');
                header.innerHTML = isDaily
                    ? '<span>Rank</span><span>Player</span><span style="text-align:right;">Time</span>'
                    : '<span>Rank</span><span>Player</span><span style="text-align:center;">Mirrors</span><span style="text-align:right;">Time</span>';

                body.innerHTML = entries.map((entry, i) => {
                    const rank = i + 1;
                    const rankClass = rank <= 3 ? ` rank-${rank}` : '';
                    const youClass = entry.uid === uid ? ' you' : '';
                    const modeClass = isDaily ? ' daily-mode' : '';
                    const initial = (entry.displayName || 'A').charAt(0).toUpperCase();
                    const mirrorsCol = isDaily ? '' : `<span class="mirror-count">${entry.mirrorCount || '--'}</span>`;
                    const hasVideo = !isDaily && rank <= 10 && entry.videoPath;
                    const videoAttr = hasVideo ? ` data-video-path="${escapeHtml(entry.videoPath)}" data-player="${escapeHtml(entry.displayName || 'Anonymous')}" data-score="${escapeHtml(entry.scoreFormatted || formatScore(entry.score))}"` : '';
                    const playIcon = hasVideo ? '<i class="iconoir-play" style="font-size: 10px; opacity: 0.5; margin-left: 4px;"></i>' : '';
                    const clickClass = hasVideo ? ' has-replay' : '';

                    return `
                        <div class="leaderboard-row${rankClass}${youClass}${modeClass}${clickClass}"${videoAttr}>
                            <span class="rank">#${rank}</span>
                            <div class="player-info">
                                <div class="player-avatar">${initial}</div>
                                <span class="player-name">${escapeHtml(entry.displayName || 'Anonymous')}${playIcon}</span>
                            </div>
                            ${mirrorsCol}
                            <span class="score">${escapeHtml(entry.scoreFormatted || formatScore(entry.score))}</span>
                        </div>
                    `;
                }).join('');

                // Attach click handlers for replay-enabled rows
                body.querySelectorAll('.has-replay').forEach(row => {
                    row.style.cursor = 'pointer';
                    row.addEventListener('click', () => {
                        const videoPath = row.dataset.videoPath;
                        const player = row.dataset.player;
                        const score = row.dataset.score;
                        openReplayModal(videoPath, player, score);
                    });
                });

            } catch (error) {
                console.error('Failed to load leaderboard:', error);
                body.innerHTML = '<div class="empty-state"><i class="iconoir-warning-triangle"></i><div>Failed to load scores. Please try again.</div></div>';
            }
        }

        async function loadStats() {
            try {
                // Total players
                const total = await service.getTotalPlayers(currentMode);
                document.getElementById('statTotalPlayers').textContent = total.toLocaleString();

                // User's best score
                const dailyDate = currentMode === 'daily' ? currentDailyDate : null;
                const userScore = await service.getUserScore(currentMode, dailyDate);
                if (userScore) {
                    document.getElementById('statYourBest').textContent = userScore.scoreFormatted || formatScore(userScore.score);

                    // User's rank
                    const rank = await service.getUserRank(currentMode, userScore.score);
                    document.getElementById('statYourRank').textContent = rank ? `#${rank}` : '--';
                } else {
                    document.getElementById('statYourBest').textContent = '--';
                    document.getElementById('statYourRank').textContent = '--';
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        function formatScore(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            const cs = Math.floor((seconds % 1) * 100);
            return `${mins}:${secs.toString().padStart(2, '0')}.${cs.toString().padStart(2, '0')}`;
        }

        function escapeHtml(str) {
            // Escapes for BOTH text and attribute contexts. The quote escapes are
            // essential: leaderboard rows interpolate these values into double-quoted
            // HTML attributes (data-video-path, data-player, ...), so an unescaped
            // quote would break out of the attribute and inject an event handler.
            return String(str == null ? '' : str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Replay video modal
        async function openReplayModal(videoPath, playerName, score) {
            const modal = document.getElementById('replayModal');
            const video = document.getElementById('replayVideo');
            const loading = document.getElementById('replayLoading');
            const error = document.getElementById('replayError');
            const title = document.getElementById('replayTitle');

            title.textContent = `${playerName} - ${score}`;
            video.style.display = 'none';
            video.src = '';
            loading.style.display = 'block';
            error.style.display = 'none';
            modal.classList.remove('hidden');

            try {
                const { getStorage } = await import('./js/firebase/FirebaseConfig.js');
                const storage = getStorage();
                const url = await storage.ref(videoPath).getDownloadURL();

                loading.style.display = 'none';
                video.style.display = 'block';
                video.src = url;
                video.play().catch(() => {});
            } catch (err) {
                loading.style.display = 'none';
                error.style.display = 'block';
            }
        }

        window.closeReplayModal = function() {
            const modal = document.getElementById('replayModal');
            const video = document.getElementById('replayVideo');
            video.pause();
            video.src = '';
            modal.classList.add('hidden');
        };

        // Close on backdrop click
        document.getElementById('replayModal').addEventListener('click', function(e) {
            if (e.target === this) closeReplayModal();
        });

        // ESC key closes replay modal
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('replayModal');
                if (modal && !modal.classList.contains('hidden')) {
                    closeReplayModal();
                }
            }
        });

        // Start
        init().catch(err => {
            console.error('Leaderboard init failed:', err);
            document.getElementById('leaderboardBody').innerHTML =
                '<div class="empty-state"><i class="iconoir-warning-triangle"></i><div>Failed to connect to leaderboard. Please try again.</div></div>';
        });
    </script>
</body>
</html>
